services:
  api:
    image: ${MEETMIND_API_IMAGE:-meetmind-api:latest}
    container_name: ${MEETMIND_API_CONTAINER_NAME:-meetmind-api}
    ports:
      - '${MEETMIND_API_PORT:-3452}:3452'
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: '1'
    volumes:
      - meetmind_api_data:/app/packages/api/app/data
      - meetmind_api_uploads:/app/packages/api/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:3452/health\", timeout=5).read()"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: ${MEETMIND_WEB_IMAGE:-meetmind-web:latest}
    container_name: ${MEETMIND_WEB_CONTAINER_NAME:-meetmind-web}
    ports:
      - '${MEETMIND_WEB_PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      INTERNAL_API_URL: http://api:3452/api
      INTERNAL_API_URL_UPLOADS: http://api:3452
      NEXT_PUBLIC_PROD_API_PATH: /api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:3000\").then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  meetmind_api_data:
  meetmind_api_uploads:

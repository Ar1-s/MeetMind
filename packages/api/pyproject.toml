[project]
name = "meetmind-api"
version = "0.1.0"
description = "MeetMind Backend API"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.0",
    "pydantic>=2.5.0,<2.7",
    "pydantic-settings>=2.1.0,<2.3",
    "python-multipart>=0.0.6",
    "aiosqlite>=0.19.0",
    "greenlet>=3.0.0",
    "langchain>=0.1.0",
    "langchain-core>=0.2.0",
    "langchain-community>=0.0.30",
    "pydub>=0.25.1",
    "python-dotenv>=1.0.0",
    "dashscope>=1.25.16",
    "aiofiles>=23.2.0",
    "email-validator>=2.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeetMind 绂荤嚎妯″紡</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: rgba(255, 255, 255, 0.88);
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 32%),
          linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
        font-family: 'SF Pro Display', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
        color: var(--text);
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: var(--muted);
      }

      strong {
        color: var(--accent);
      }

      a {
        display: inline-flex;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        color: white;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>褰撳墠澶勪簬绂荤嚎妯″紡</h1>
      <p>MeetMind 浼氫紭鍏堟樉绀哄凡缂撳瓨椤甸潰锛屾柊鐨勭綉缁滆姹備細鍦ㄦ仮澶嶈繛鎺ュ悗缁х画澶勭悊銆?/p>
      <p><strong>褰曢煶涓婁紶涓嶄細涓㈠け</strong>锛岄噸鏂拌仈缃戝悗浼氳嚜鍔ㄤ粠鏈湴闃熷垪琛ヤ紶銆?/p>
      <a href="/">杩斿洖棣栭〉</a>
    </main>
  </body>
</html>
